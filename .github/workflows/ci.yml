# CI — runs the kinship engine test suite on every push and PR.
# The engine is the crown jewel; it never merges broken.
name: CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Engine tests
        working-directory: web
        run: node tests/kinship.test.js
