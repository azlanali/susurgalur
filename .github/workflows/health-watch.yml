# Jaga Stage 1 — watch & report (docs/OPERATIONS.md §2).
# Pings /api/health every 15 minutes. On failure: opens a GitHub issue
# labelled "incident" (which can later trigger the Stage 2 ops agent).
#
# Setup: repo Settings → Variables → Actions → add HEALTH_URL
#   e.g. https://susurgalur.vercel.app/api/health
name: Health watch
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  ping:
    runs-on: ubuntu-latest
    if: vars.HEALTH_URL != ''
    steps:
      - name: Check /api/health
        id: check
        run: |
          code=$(curl -s -o body.json -w "%{http_code}" --max-time 20 "${{ vars.HEALTH_URL }}" || echo "000")
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "HTTP $code"; cat body.json 2>/dev/null || true
          if [ "$code" != "200" ]; then exit 1; fi

      - name: Open incident issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: "incident", state: "open",
            });
            if (open.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `Health check failed — ${new Date().toISOString()}`,
                labels: ["incident"],
                body: `\`/api/health\` did not return 200.\n\nURL: ${{ vars.HEALTH_URL }}\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nCheck Vercel deploys and Supabase status first.`,
              });
            }
